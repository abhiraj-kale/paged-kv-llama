<svg xmlns="http://www.w3.org/2000/svg" width="900" height="250" viewBox="0 0 900 250" font-family="Consolas, 'Courier New', monospace">
  <rect x="0" y="0" width="900" height="250" rx="8" fill="#0d1117" stroke="#30363d"/>
  <rect x="0" y="0" width="900" height="30" rx="8" fill="#161b22"/>
  <rect x="0" y="16" width="900" height="14" fill="#161b22"/>
  <circle cx="20" cy="15" r="6" fill="#ff5f56"/><circle cx="40" cy="15" r="6" fill="#ffbd2e"/><circle cx="60" cy="15" r="6" fill="#27c93f"/>
  <text x="450" y="19" fill="#8b949e" font-size="12" text-anchor="middle">wsl - paged output vs. original flat-buffer baseline</text>

  <text font-size="13" xml:space="preserve">
    <tspan x="18" y="58" fill="#7ee787">$ diff  original_flatbuffer.txt  paged_kvcache.txt</tspan>
    <tspan x="18" y="86" fill="#e6edf3">3c3</tspan>
    <tspan x="18" y="106" fill="#f85149">&lt; Suddenly, a big bird came down from    achieved tok/s: 7.038749</tspan>
    <tspan x="18" y="124" fill="#8b949e">---</tspan>
    <tspan x="18" y="142" fill="#3fb950">&gt; Suddenly, a big bird came down from    achieved tok/s: 5.533508</tspan>
    <tspan x="18" y="176" fill="#c9d1d9">Only the (stderr) tok/s timing line differs.</tspan>
    <tspan x="18" y="198" fill="#7ee787" font-weight="bold">The generated text is byte-for-byte identical - same seed, same prompt,</tspan>
    <tspan x="18" y="216" fill="#7ee787" font-weight="bold">same exact token sequence. The paging refactor changed HOW memory is</tspan>
    <tspan x="18" y="234" fill="#7ee787" font-weight="bold">laid out, not WHAT the model produces.</tspan>
  </text>
</svg>
