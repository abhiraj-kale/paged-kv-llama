<svg xmlns="http://www.w3.org/2000/svg" width="940" height="600" viewBox="0 0 940 600" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="940" height="600" fill="#0d1117"/>
  <text x="470" y="36" fill="#e6edf3" font-size="22" font-weight="700" text-anchor="middle">Paged KV-Cache - logical positions map to a shared pool of physical pages</text>
  <text x="470" y="60" fill="#8b949e" font-size="13" text-anchor="middle">PAGE_SIZE = 16 token positions per page · one page holds K (or V) for all layers</text>

  <!-- ===== LEFT: per-sequence page tables ===== -->
  <text x="180" y="98" fill="#58a6ff" font-size="15" font-weight="700" text-anchor="middle">Per-sequence PageTable</text>
  <text x="180" y="116" fill="#8b949e" font-size="11" text-anchor="middle">logical block -> physical page id</text>

  <!-- Seq A -->
  <rect x="40" y="130" width="280" height="66" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="52" y="152" fill="#e6edf3" font-size="13" font-weight="700">Seq A</text>
  <rect x="112" y="138" width="46" height="24" rx="3" fill="#1f6feb"/><text x="135" y="155" fill="#fff" font-size="11" text-anchor="middle">blk 0</text>
  <rect x="164" y="138" width="46" height="24" rx="3" fill="#1f6feb"/><text x="187" y="155" fill="#fff" font-size="11" text-anchor="middle">blk 1</text>
  <text x="52" y="184" fill="#8b949e" font-size="10">pos 0..31  (32 tokens so far)</text>

  <!-- Seq B -->
  <rect x="40" y="212" width="280" height="52" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="52" y="234" fill="#e6edf3" font-size="13" font-weight="700">Seq B</text>
  <rect x="112" y="226" width="46" height="24" rx="3" fill="#2ea043"/><text x="135" y="243" fill="#fff" font-size="11" text-anchor="middle">blk 0</text>
  <text x="170" y="243" fill="#8b949e" font-size="10">pos 0..9 (short reply)</text>

  <!-- Seq C -->
  <rect x="40" y="280" width="280" height="66" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="52" y="302" fill="#e6edf3" font-size="13" font-weight="700">Seq C</text>
  <rect x="112" y="288" width="46" height="24" rx="3" fill="#a371f7"/><text x="135" y="305" fill="#fff" font-size="11" text-anchor="middle">blk 0</text>
  <rect x="164" y="288" width="46" height="24" rx="3" fill="#a371f7"/><text x="187" y="305" fill="#fff" font-size="11" text-anchor="middle">blk 1</text>
  <text x="52" y="334" fill="#8b949e" font-size="10">pos 0..31</text>

  <!-- ===== RIGHT: shared pool ===== -->
  <text x="720" y="98" fill="#58a6ff" font-size="15" font-weight="700" text-anchor="middle">Shared PagePool (fixed budget)</text>
  <text x="720" y="116" fill="#8b949e" font-size="11" text-anchor="middle">allocate on demand · free list reclaims finished pages</text>
  <rect x="560" y="132" width="330" height="250" rx="8" fill="#161b22" stroke="#30363d"/>

  <!-- physical pages grid -->
  <!-- row 1 -->
  <rect x="580" y="152" width="66" height="40" rx="4" fill="#1f6feb"/><text x="613" y="177" fill="#fff" font-size="11" text-anchor="middle">page 0 (A)</text>
  <rect x="658" y="152" width="66" height="40" rx="4" fill="#a371f7"/><text x="691" y="177" fill="#fff" font-size="11" text-anchor="middle">page 1 (C)</text>
  <rect x="736" y="152" width="66" height="40" rx="4" fill="#2ea043"/><text x="769" y="177" fill="#fff" font-size="11" text-anchor="middle">page 2 (B)</text>
  <rect x="814" y="152" width="56" height="40" rx="4" fill="#1f6feb"/><text x="842" y="177" fill="#fff" font-size="11" text-anchor="middle">pg3 (A)</text>
  <!-- row 2 -->
  <rect x="580" y="204" width="66" height="40" rx="4" fill="#a371f7"/><text x="613" y="229" fill="#fff" font-size="11" text-anchor="middle">page 4 (C)</text>
  <rect x="658" y="204" width="66" height="40" rx="4" fill="#21262d" stroke="#484f58" stroke-dasharray="4 3"/><text x="691" y="229" fill="#8b949e" font-size="11" text-anchor="middle">free</text>
  <rect x="736" y="204" width="66" height="40" rx="4" fill="#21262d" stroke="#484f58" stroke-dasharray="4 3"/><text x="769" y="229" fill="#8b949e" font-size="11" text-anchor="middle">free</text>
  <rect x="814" y="204" width="56" height="40" rx="4" fill="#21262d" stroke="#484f58" stroke-dasharray="4 3"/><text x="842" y="229" fill="#8b949e" font-size="11" text-anchor="middle">free</text>

  <text x="600" y="300" fill="#8b949e" font-size="12">free_list: [5, 6, 7, ...]  &#8592;  pop on allocate, push on release</text>
  <text x="600" y="326" fill="#8b949e" font-size="12">peak pages in use tracked for benchmarking</text>
  <text x="600" y="360" fill="#e6edf3" font-size="12" font-weight="700">one page = n_layers x PAGE_SIZE x kv_dim floats</text>

  <!-- indirection arrows -->
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8b949e"/></marker>
  </defs>
  <path d="M210,150 C 420,150 430,172 578,172" fill="none" stroke="#1f6feb" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M210,150 C 430,150 620,180 812,172" fill="none" stroke="#1f6feb" stroke-width="1.2" opacity="0.5" marker-end="url(#arrow)"/>
  <path d="M158,238 C 400,240 480,224 734,172" fill="none" stroke="#2ea043" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M210,300 C 420,300 470,224 656,172" fill="none" stroke="#a371f7" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ===== PeterDB parallel ===== -->
  <rect x="40" y="420" width="860" height="150" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="60" y="448" fill="#f0883e" font-size="15" font-weight="700">Same design as a slotted-page DB storage engine (PeterDB)</text>
  <text x="60" y="476" fill="#8b949e" font-size="13">record id -> (page, slot) directory        &#8594;  token position -> (physical page, offset) page table</text>
  <text x="60" y="500" fill="#8b949e" font-size="13">one shared pool of fixed-size pages          &#8594;  one shared pool of fixed-size KV pages</text>
  <text x="60" y="524" fill="#8b949e" font-size="13">free list reclaims deleted records' space    &#8594;  free list reclaims a finished sequence's pages</text>
  <text x="60" y="548" fill="#8b949e" font-size="13">allocate a new page only when one fills up   &#8594;  allocate a new page only as a sequence grows</text>
</svg>
